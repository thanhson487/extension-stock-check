<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Settings</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h2 style="margin-top:16px">Mốc đã mua – Cổ phiếu</h2>
    <div id="dropStockAll" class="input-group" style="display:flex;flex-direction:column;gap:8px;"></div>
    <div class="actions">
      <button id="dropStockSave" class="primary">Lưu mốc CP</button>
      <button id="dropStockExport">Xuất CP</button>
      <label style="display:inline-block;margin-left:8px">
        <input type="file" id="dropStockImport" accept="application/json">
        Import CP
      </label>
    </div>

    <h2 style="margin-top:16px">Mốc đã mua – CCQ</h2>
    <div id="dropFundAll" class="input-group" style="display:flex;flex-direction:column;gap:8px;"></div>
    <div class="actions">
      <button id="dropFundSave" class="primary">Lưu mốc CCQ</button>
      <button id="dropFundExport">Xuất CCQ</button>
      <label style="display:inline-block;margin-left:8px">
        <input type="file" id="dropFundImport" accept="application/json">
        Import CCQ
      </label>
    </div>
  </div>
  <script type="module" src="popup.ts"></script>
</body>
